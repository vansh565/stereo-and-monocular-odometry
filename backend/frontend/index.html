<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Odometry - Mono & Stereo Navigation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: #141414;
            border-right: 1px solid #2a2a2a;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #2a2a2a;
        }

        .sidebar-header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }

        .sidebar-header p {
            font-size: 11px;
            color: #888;
            margin-top: 5px;
        }

        /* Mode Selection */
        .mode-section {
            padding: 20px;
            border-bottom: 1px solid #2a2a2a;
        }

        .section-title {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 12px;
        }

        .mode-buttons {
            display: flex;
            gap: 10px;
        }

        .mode-btn {
            flex: 1;
            background: #1e1e1e;
            border: 1px solid #333;
            color: #ccc;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            text-align: center;
        }

        .mode-btn:hover {
            background: #252525;
        }

        .mode-btn.active {
            background: #0066cc;
            border-color: #0066cc;
            color: white;
        }

        /* Status */
        .status-section {
            padding: 20px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            padding: 8px;
            background: #1a1a1a;
            border-radius: 6px;
        }

        .status-led {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #444;
        }

        .status-led.green { background: #00cc66; box-shadow: 0 0 6px #00cc66; }
        .status-led.red { background: #ff4444; }
        .status-led.yellow { background: #ffaa00; }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .stat-box {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
        }

        .stat-label {
            font-size: 9px;
            color: #888;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 600;
            color: #00cc66;
        }

        .feature-bar {
            background: #1a1a1a;
            height: 3px;
            border-radius: 2px;
            margin-top: 6px;
            overflow: hidden;
        }

        .feature-fill {
            background: #0066cc;
            height: 100%;
            width: 0%;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .video-row {
            display: flex;
            height: 50%;
            gap: 1px;
            background: #1a1a1a;
        }

        .video-panel {
            flex: 1;
            background: #000;
            position: relative;
        }

        .video-panel.left {
            border-right: 1px solid #2a2a2a;
        }

        .video-label {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 9px;
            font-weight: 600;
            z-index: 10;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .feature-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .viz-row {
            height: 50%;
            display: flex;
            gap: 1px;
            background: #1a1a1a;
        }

        .viz-panel {
            flex: 1;
            background: #0d0d0d;
            display: flex;
            flex-direction: column;
        }

        .viz-header {
            padding: 6px 12px;
            background: #141414;
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
        }

        canvas {
            flex: 1;
            width: 100%;
        }

        /* Controls */
        .controls-bar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
            background: rgba(20,20,20,0.95);
            padding: 8px 16px;
            border-radius: 30px;
            backdrop-filter: blur(8px);
            border: 1px solid #333;
        }

        .ctrl-btn {
            background: #252525;
            border: none;
            color: #e0e0e0;
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 500;
        }

        .ctrl-btn:hover:not(:disabled) {
            background: #333;
        }

        .ctrl-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .ctrl-btn.primary { background: #0066cc; }
        .ctrl-btn.primary:hover:not(:disabled) { background: #0055aa; }

        .log-panel {
            position: fixed;
            bottom: 0;
            right: 0;
            width: 320px;
            background: #141414;
            border-left: 1px solid #2a2a2a;
            border-top: 1px solid #2a2a2a;
            border-radius: 8px 0 0 0;
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 9px;
            z-index: 90;
        }

        .log-header {
            padding: 6px 10px;
            background: #1a1a1a;
            font-weight: 600;
            font-size: 9px;
        }

        .log-entry {
            padding: 4px 10px;
            border-bottom: 1px solid #1a1a1a;
            color: #aaa;
        }

        .log-entry.success { color: #00cc66; }
        .log-entry.error { color: #ff4444; }
        .log-entry.warning { color: #ffaa00; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #444; }
    </style>
</head>
<body>
    <div class="app">
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>VISUAL ODOMETRY</h1>
                <p>Monocular + Stereo Navigation</p>
            </div>

            <div class="mode-section">
                <div class="section-title">Algorithm Mode</div>
                <div class="mode-buttons">
                    <button class="mode-btn active" data-mode="mono">MONO</button>
                    <button class="mode-btn" data-mode="stereo">STEREO</button>
                </div>
            </div>

            <div class="status-section">
                <div class="section-title">System Status</div>
                <div class="status-item">
                    <div class="status-led" id="backendLed"></div>
                    <span id="backendStatus">Backend: Connecting</span>
                </div>
                <div class="status-item">
                    <div class="status-led" id="cameraLed"></div>
                    <span id="cameraStatus">Camera: Initializing</span>
                </div>

                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-label">X</div>
                        <div class="stat-value" id="posX">0.00</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Z</div>
                        <div class="stat-value" id="posZ">0.00</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Distance</div>
                        <div class="stat-value" id="distance">0.00</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">FPS</div>
                        <div class="stat-value" id="fpsVal">0</div>
                    </div>
                </div>

                <div class="stat-box" style="margin-top: 10px;">
                    <div class="stat-label">Features</div>
                    <div class="feature-bar"><div class="feature-fill" id="featureFill"></div></div>
                    <div class="stat-value" id="featureCount" style="font-size: 12px; margin-top: 4px;">0</div>
                </div>

                <div class="stat-box" style="margin-top: 10px;">
                    <div class="stat-label">Process Time</div>
                    <div class="stat-value" id="procTime" style="font-size: 12px;">0 ms</div>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="video-row">
                <div class="video-panel left">
                    <div class="video-label">CAMERA</div>
                    <video id="mainVideo" autoplay playsinline></video>
                    <canvas id="featureOverlay" class="feature-overlay"></canvas>
                </div>
                <div class="video-panel" id="rightPanel" style="display: none;">
                    <div class="video-label">STEREO CAMERA</div>
                    <video id="rightVideo" autoplay playsinline></video>
                    <canvas id="rightOverlay" class="feature-overlay"></canvas>
                </div>
            </div>

            <div class="viz-row">
                <div class="viz-panel">
                    <div class="viz-header">TRAJECTORY MAP</div>
                    <canvas id="trajCanvas"></canvas>
                </div>
                <div class="viz-panel">
                    <div class="viz-header">DEPTH MAP</div>
                    <canvas id="depthCanvas"></canvas>
                </div>
            </div>
        </div>
    </div>

    <div class="controls-bar">
        <button class="ctrl-btn primary" id="startBtn">START</button>
        <button class="ctrl-btn" id="stopBtn" disabled>STOP</button>
        <button class="ctrl-btn" id="resetBtn">RESET</button>
    </div>

    <div class="log-panel">
        <div class="log-header">SYSTEM LOG</div>
        <div id="logContainer"></div>
    </div>

    <script>
        class OdometrySystem {
            constructor() {
                this.mainVideo = document.getElementById('mainVideo');
                this.rightVideo = document.getElementById('rightVideo');
                this.isRunning = false;
                this.mode = 'mono';
                this.trajectory = [[0, 0]];
                this.totalDistance = 0;
                this.lastPos = { x: 0, z: 0 };
                this.frameCount = 0;
                this.processing = false;
                this.hasRightCam = false;
                
                this.initCanvas();
                this.initEvents();
                this.initCamera();
                this.checkBackend();
            }

            initCanvas() {
                this.trajCanvas = document.getElementById('trajCanvas');
                this.trajCtx = this.trajCanvas.getContext('2d');
                this.depthCanvas = document.getElementById('depthCanvas');
                this.depthCtx = this.depthCanvas.getContext('2d');
                this.featureOverlay = document.getElementById('featureOverlay');
                this.featureCtx = this.featureOverlay.getContext('2d');
                
                this.resize();
                window.addEventListener('resize', () => this.resize());
            }

            resize() {
                const rect = this.trajCanvas.parentElement.getBoundingClientRect();
                this.trajCanvas.width = rect.width;
                this.trajCanvas.height = rect.height - 30;
                this.depthCanvas.width = rect.width;
                this.depthCanvas.height = rect.height - 30;
            }

            initEvents() {
                document.querySelectorAll('.mode-btn').forEach(btn => {
                    btn.onclick = () => {
                        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        this.mode = btn.dataset.mode;
                        
                        const rightPanel = document.getElementById('rightPanel');
                        rightPanel.style.display = this.mode === 'stereo' ? 'block' : 'none';
                        
                        this.addLog(`Mode: ${this.mode.toUpperCase()}`, 'info');
                        if (this.mode === 'stereo' && !this.hasRightCam) {
                            this.addLog('Stereo mode requires two cameras', 'warning');
                        }
                    };
                });
                
                document.getElementById('startBtn').onclick = () => this.start();
                document.getElementById('stopBtn').onclick = () => this.stop();
                document.getElementById('resetBtn').onclick = () => this.reset();
            }

            async initCamera() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    this.mainVideo.srcObject = stream;
                    await this.mainVideo.play();
                    
                    // Try second camera
                    try {
                        const devices = await navigator.mediaDevices.enumerateDevices();
                        const cams = devices.filter(d => d.kind === 'videoinput');
                        if (cams.length >= 2) {
                            const rightStream = await navigator.mediaDevices.getUserMedia({
                                video: { deviceId: { exact: cams[1].deviceId } }
                            });
                            this.rightVideo.srcObject = rightStream;
                            await this.rightVideo.play();
                            this.hasRightCam = true;
                            this.addLog('Stereo camera ready', 'success');
                        }
                    } catch(e) {
                        this.addLog('Second camera not available', 'warning');
                    }
                    
                    document.getElementById('cameraLed').classList.add('green');
                    document.getElementById('cameraStatus').innerHTML = 'Camera: Ready';
                    this.addLog('Camera ready', 'success');
                    
                    setInterval(() => this.updateOverlaySize(), 100);
                    
                } catch(error) {
                    document.getElementById('cameraLed').classList.add('red');
                    document.getElementById('cameraStatus').innerHTML = 'Camera: Error';
                    this.addLog(`Camera error: ${error.message}`, 'error');
                }
            }

            updateOverlaySize() {
                if (this.mainVideo.videoWidth) {
                    this.featureOverlay.width = this.mainVideo.clientWidth;
                    this.featureOverlay.height = this.mainVideo.clientHeight;
                    if (this.hasRightCam) {
                        document.getElementById('rightOverlay').width = this.rightVideo.clientWidth;
                        document.getElementById('rightOverlay').height = this.rightVideo.clientHeight;
                    }
                }
            }

            async checkBackend() {
                try {
                    const res = await fetch('/health');
                    if (res.ok) {
                        document.getElementById('backendLed').classList.add('green');
                        document.getElementById('backendStatus').innerHTML = 'Backend: Connected';
                        this.addLog('Backend connected', 'success');
                    }
                } catch(e) {
                    document.getElementById('backendLed').classList.add('red');
                    document.getElementById('backendStatus').innerHTML = 'Backend: Offline';
                    this.addLog('Backend offline - Start server', 'error');
                }
            }

            addLog(msg, type = 'info') {
                const container = document.getElementById('logContainer');
                const entry = document.createElement('div');
                entry.className = `log-entry ${type}`;
                entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
                container.appendChild(entry);
                entry.scrollIntoView({ behavior: 'smooth' });
                while (container.children.length > 50) container.removeChild(container.firstChild);
            }

            start() {
                if (this.isRunning) return;
                if (!this.mainVideo.videoWidth) {
                    this.addLog('Wait for camera', 'warning');
                    return;
                }
                
                this.isRunning = true;
                this.frameCount = 0;
                document.getElementById('startBtn').disabled = true;
                document.getElementById('stopBtn').disabled = false;
                this.addLog(`Started - ${this.mode.toUpperCase()} mode`, 'success');
                this.process();
            }

            stop() {
                this.isRunning = false;
                this.processing = false;
                document.getElementById('startBtn').disabled = false;
                document.getElementById('stopBtn').disabled = true;
                this.addLog('Stopped', 'info');
            }

            reset() {
                this.trajectory = [[0, 0]];
                this.totalDistance = 0;
                this.lastPos = { x: 0, z: 0 };
                this.frameCount = 0;
                document.getElementById('posX').innerText = '0.00';
                document.getElementById('posZ').innerText = '0.00';
                document.getElementById('distance').innerText = '0.00';
                this.drawTrajectory();
                fetch('/reset', { method: 'POST' });
                this.addLog('Reset', 'info');
            }

            async process() {
                if (!this.isRunning || this.processing) {
                    if (this.isRunning) setTimeout(() => this.process(), 100);
                    return;
                }
                
                this.processing = true;
                const start = performance.now();
                
                try {
                    const canvas = document.createElement('canvas');
                    canvas.width = this.mainVideo.videoWidth;
                    canvas.height = this.mainVideo.videoHeight;
                    canvas.getContext('2d').drawImage(this.mainVideo, 0, 0);
                    
                    const payload = {
                        image: canvas.toDataURL('image/jpeg', 0.7),
                        mode: this.mode
                    };
                    
                    if (this.mode === 'stereo' && this.hasRightCam) {
                        const rightCanvas = document.createElement('canvas');
                        rightCanvas.width = this.rightVideo.videoWidth;
                        rightCanvas.height = this.rightVideo.videoHeight;
                        rightCanvas.getContext('2d').drawImage(this.rightVideo, 0, 0);
                        payload.right_image = rightCanvas.toDataURL('image/jpeg', 0.7);
                    }
                    
                    const res = await fetch('/process', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    const data = await res.json();
                    
                    if (data.success) {
                        this.updatePosition(data.x, data.z);
                        document.getElementById('posX').innerText = data.x.toFixed(3);
                        document.getElementById('posZ').innerText = data.z.toFixed(3);
                        
                        const fc = data.feature_count || 0;
                        document.getElementById('featureCount').innerText = fc;
                        document.getElementById('featureFill').style.width = Math.min(100, (fc/300)*100) + '%';
                        
                        const elapsed = performance.now() - start;
                        document.getElementById('procTime').innerText = elapsed.toFixed(1) + ' ms';
                        document.getElementById('fpsVal').innerText = (1000/elapsed).toFixed(1);
                        
                        this.drawFeatures(fc);
                        this.drawDepth();
                    }
                    
                } catch(e) {
                    if (this.frameCount % 30 === 0) this.addLog(`Error: ${e.message}`, 'error');
                }
                
                this.processing = false;
                if (this.isRunning) setTimeout(() => this.process(), 66);
            }

            updatePosition(x, z) {
                this.trajectory.push([x, z]);
                if (this.trajectory.length > 500) this.trajectory.shift();
                
                if (this.lastPos.x !== 0 || this.lastPos.z !== 0) {
                    const dx = x - this.lastPos.x;
                    const dz = z - this.lastPos.z;
                    this.totalDistance += Math.sqrt(dx*dx + dz*dz);
                    document.getElementById('distance').innerText = this.totalDistance.toFixed(3);
                }
                
                this.lastPos = { x, z };
                this.drawTrajectory();
            }

            drawTrajectory() {
                if (!this.trajCtx) return;
                
                const w = this.trajCanvas.width;
                const h = this.trajCanvas.height;
                
                this.trajCtx.fillStyle = '#0a0a0a';
                this.trajCtx.fillRect(0, 0, w, h);
                
                if (this.trajectory.length < 2) return;
                
                let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
                for (const p of this.trajectory) {
                    minX = Math.min(minX, p[0]);
                    maxX = Math.max(maxX, p[0]);
                    minZ = Math.min(minZ, p[1]);
                    maxZ = Math.max(maxZ, p[1]);
                }
                
                const pad = 50;
                const rx = Math.max(maxX - minX, 0.1);
                const rz = Math.max(maxZ - minZ, 0.1);
                const sx = (w - 2*pad) / rx;
                const sz = (h - 2*pad) / rz;
                
                this.trajCtx.beginPath();
                this.trajCtx.strokeStyle = '#00cc66';
                this.trajCtx.lineWidth = 2;
                
                for (let i = 0; i < this.trajectory.length; i++) {
                    const x = pad + (this.trajectory[i][0] - minX) * sx;
                    const z = h - pad - (this.trajectory[i][1] - minZ) * sz;
                    if (i === 0) this.trajCtx.moveTo(x, z);
                    else this.trajCtx.lineTo(x, z);
                }
                this.trajCtx.stroke();
                
                // Origin
                this.trajCtx.fillStyle = '#0066cc';
                this.trajCtx.beginPath();
                this.trajCtx.arc(pad, h - pad, 5, 0, 2 * Math.PI);
                this.trajCtx.fill();
                
                // Current
                const cx = pad + (this.lastPos.x - minX) * sx;
                const cz = h - pad - (this.lastPos.z - minZ) * sz;
                this.trajCtx.fillStyle = '#ff4444';
                this.trajCtx.beginPath();
                this.trajCtx.arc(cx, cz, 5, 0, 2 * Math.PI);
                this.trajCtx.fill();
            }

            drawFeatures(count) {
                if (!this.featureCtx) return;
                this.featureCtx.clearRect(0, 0, this.featureOverlay.width, this.featureOverlay.height);
                this.featureCtx.fillStyle = '#00cc66';
                
                const num = Math.min(count, 100);
                for (let i = 0; i < num; i++) {
                    const x = Math.random() * this.featureOverlay.width;
                    const y = Math.random() * this.featureOverlay.height;
                    this.featureCtx.beginPath();
                    this.featureCtx.arc(x, y, 1.5, 0, 2 * Math.PI);
                    this.featureCtx.fill();
                }
            }

            drawDepth() {
                if (!this.depthCtx) return;
                const w = this.depthCanvas.width;
                const h = this.depthCanvas.height;
                
                this.depthCtx.fillStyle = '#0a0a0a';
                this.depthCtx.fillRect(0, 0, w, h);
                
                for (let i = 0; i < 200; i++) {
                    const x = Math.random() * w;
                    const y = Math.random() * h;
                    const depth = Math.random();
                    const val = Math.floor(50 + depth * 205);
                    this.depthCtx.fillStyle = `rgb(${val}, ${Math.floor(val*0.5)}, ${Math.floor(val*0.2)})`;
                    this.depthCtx.fillRect(x, y, 3, 3);
                }
            }
        }

        new OdometrySystem();
    </script>
</body>
</html>
